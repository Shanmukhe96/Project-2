<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #62707a;
      --gold: #f5b642;
      --coral: #f06d59;
      --teal: #168f85;
      --blue: #7cc8ef;
      --white: #ffffff;
      --shadow: 0 26px 70px rgba(23, 32, 38, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.82) 0 26%, transparent 27%),
        linear-gradient(145deg, #91d8f2 0%, #ffd47f 48%, #f8f3e6 100%);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      min-height: min(720px, calc(100vh - 32px));
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
      align-items: center;
      gap: 34px;
      padding: clamp(30px, 5vw, 72px);
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
      isolation: isolate;
    }

    nav {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 3;
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 0 0 1px rgba(23, 32, 38, 0.08);
    }

    nav a {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 13px;
      border-radius: 7px;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      text-decoration: none;
    }

    nav a[aria-current="page"] {
      background: var(--ink);
      color: var(--white);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #24665f;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 7px rgba(22, 143, 133, 0.16);
    }

    h1 {
      max-width: 9ch;
      margin: 0;
      font-size: clamp(3.4rem, 8vw, 7.8rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: var(--coral);
      text-shadow: 0 8px 0 rgba(255, 255, 255, 0.48);
    }

    p {
      max-width: 50ch;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(1.02rem, 1.7vw, 1.2rem);
      line-height: 1.65;
    }

    .contact-card {
      position: relative;
      padding: clamp(24px, 4vw, 42px);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 0 0 1px rgba(23, 32, 38, 0.08), 0 22px 48px rgba(23, 32, 38, 0.14);
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(23, 32, 38, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font: inherit;
      padding: 13px 14px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    textarea {
      min-height: 136px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(22, 143, 133, 0.14);
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: var(--white);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(23, 32, 38, 0.2);
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .quick-links a {
      display: grid;
      gap: 4px;
      min-height: 74px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--ink);
      text-decoration: none;
      box-shadow: inset 0 0 0 1px rgba(23, 32, 38, 0.08);
    }

    .quick-links strong {
      color: var(--teal);
    }

    .quick-links span {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        padding-top: 92px;
      }

      nav {
        left: 22px;
        right: auto;
      }

      .quick-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Site navigation">
      <a href="good-morning-world.html">Home</a>
      <a href="city.html">City</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>

    <section>
      <p class="eyebrow">Let's connect</p>
      <h1>Contact <span>Us</span></h1>
      <p>
        Send a note, ask about the city page, or share a bright idea for the
        next morning. This little form is ready for your message.
      </p>
      <div class="quick-links" aria-label="Quick contact links">
        <a href="mailto:hello@example.com"><strong>Email</strong><span>hello@example.com</span></a>
        <a href="city.html"><strong>City</strong><span>Back to Hyderabad</span></a>
      </div>
    </section>

    <section class="contact-card" aria-label="Contact form">
      <form>
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Write your message here"></textarea>
        </label>
        <button type="submit">Send message</button>
      </form>
    </section>
  </main>
</body>
</html>
