<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyderabad City to Chennai
    
  </title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14222b;
      --muted: #61717d;
      --gold: #f5b642;
      --coral: #f06d59;
      --teal: #168f85;
      --mint: #d8f2dc;
      --white: #ffffff;
      --shadow: 0 26px 70px rgba(20, 34, 43, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.82) 0 22%, transparent 23%),
        linear-gradient(145deg, #86d2ef 0%, #f7c978 46%, #d8f2dc 100%);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      min-height: min(720px, calc(100vh - 32px));
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(320px, 1.05fr);
      align-items: center;
      gap: 34px;
      padding: clamp(30px, 5vw, 72px);
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
      isolation: isolate;
    }

    nav {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 3;
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 0 0 1px rgba(20, 34, 43, 0.08);
    }

    nav a {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 13px;
      border-radius: 7px;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      text-decoration: none;
    }

    nav a[aria-current="page"] {
      background: var(--ink);
      color: var(--white);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #24665f;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 0 7px rgba(240, 109, 89, 0.16);
    }

    h1 {
      max-width: 9ch;
      margin: 0;
      font-size: clamp(3.5rem, 8vw, 8rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: var(--teal);
      text-shadow: 0 8px 0 rgba(255, 255, 255, 0.48);
    }

    p {
      max-width: 52ch;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(1.02rem, 1.7vw, 1.2rem);
      line-height: 1.65;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 32px;
      padding: 0 20px;
      border-radius: 8px;
      background: var(--ink);
      color: var(--white);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(20, 34, 43, 0.2);
    }

    .city-art {
      position: relative;
      min-height: 470px;
      display: grid;
      align-items: end;
      padding-bottom: 48px;
    }

    .sun {
      position: absolute;
      top: 34px;
      right: 54px;
      width: 170px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff4a5 0 18%, #f5b642 19% 66%, #f06d59 100%);
      box-shadow: 0 0 0 28px rgba(245, 182, 66, 0.2), 0 24px 60px rgba(240, 109, 89, 0.26);
      animation: float 4.5s ease-in-out infinite alternate;
    }

    .skyline {
      position: relative;
      height: 270px;
      border-bottom: 12px solid rgba(20, 34, 43, 0.8);
    }

    .tower,
    .dome,
    .arch,
    .block {
      position: absolute;
      bottom: 0;
      background: rgba(20, 34, 43, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .tower {
      width: 54px;
      height: 210px;
      border-radius: 26px 26px 0 0;
    }

    .tower::before {
      content: "";
      position: absolute;
      top: -38px;
      left: 19px;
      width: 16px;
      height: 46px;
      border-radius: 9px 9px 0 0;
      background: var(--ink);
    }

    .tower.one {
      left: 70px;
    }

    .tower.two {
      right: 90px;
      height: 235px;
    }

    .dome {
      left: 182px;
      width: 190px;
      height: 128px;
      border-radius: 110px 110px 0 0;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.22) 0 10px, transparent 11px),
        rgba(20, 34, 43, 0.92);
    }

    .arch {
      left: 232px;
      bottom: 0;
      width: 90px;
      height: 86px;
      border-radius: 48px 48px 0 0;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 0 0 12px rgba(20, 34, 43, 0.92);
    }

    .block {
      left: 18px;
      width: 74px;
      height: 92px;
      border-radius: 8px 8px 0 0;
    }

    .block.two {
      left: auto;
      right: 20px;
      width: 86px;
      height: 120px;
    }

    .lights {
      position: absolute;
      inset: auto 26px 22px 26px;
      height: 10px;
      background: repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 28px);
      opacity: 0.82;
    }

    .stats {
      position: absolute;
      left: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: min(520px, 100%);
      transform: translateY(8px);
    }

    .stat {
      padding: 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: inset 0 0 0 1px rgba(20, 34, 43, 0.08);
    }

    .stat strong {
      display: block;
      color: var(--teal);
      font-size: 1.25rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    @keyframes float {
      to {
        transform: translateY(-14px);
      }
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        padding-top: 92px;
      }

      nav {
        left: 22px;
        right: auto;
      }

      .city-art {
        min-height: 360px;
      }

      .stats {
        position: relative;
        grid-template-columns: 1fr;
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Site navigation">
      <a href="good-morning-world.html">Home</a>
      <a href="city.html" aria-current="page">City</a>
      <a href="contact.html">Contact</a>
    </nav>

    <section>
      <p class="eyebrow">City glow</p>
      <h1>Hello <span>Hyderabad</span></h1>
      <p>
        A bright city page inspired by morning markets, landmark silhouettes,
        warm stone, and the quick rhythm of a place waking up beautifully.
      </p>
      <a class="button" href="contact.html">Plan a visit</a>
    </section>

    <section class="city-art" aria-label="Stylized Hyderabad skyline">
      <div class="sun"></div>
      <div class="skyline" aria-hidden="true">
        <div class="block"></div>
        <div class="tower one"></div>
        <div class="dome"></div>
        <div class="arch"></div>
        <div class="tower two"></div>
        <div class="block two"></div>
        <div class="lights"></div>
      </div>
      <div class="stats">
        <div class="stat"><strong>Sunrise</strong><span>Golden streets</span></div>
        <div class="stat"><strong>Culture</strong><span>Old meets new</span></div>
        <div class="stat"><strong>Flavor</strong><span>Spice and chai</span></div>
      </div>
    </section>
  </main>
</body>
</html>
